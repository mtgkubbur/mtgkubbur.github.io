project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "throun.qmd"
    - "einvigi.qmd"
    - "kubbar.qmd"
    - "dagatal.qmd"
    - "methods.qmd"

website:
  title: "MtG Kubbur"
  favicon: favicon.svg
  description: "Magic: The Gathering Cube Drafts á Íslandi"
  site-url: "https://mtgkubbur.is"

  navbar:
    search: false
    left:
      - text: "Stigatafla"
        href: index.qmd
      - text: "Leikmaður"
        href: throun.qmd
      - text: "Einvígi"
        href: einvigi.qmd
      - text: "Kubbar"
        href: kubbar.qmd
      - text: "Dagatal"
        href: dagatal.qmd
    right:
      - text: "EN"
        href: "en/index.html"
        aria-label: "Switch to English"
      - icon: github
        href: https://github.com/mtgkubbur/mtgkubbur.github.io
        aria-label: GitHub

  page-footer:
    left: |
      <span class="footer-brand">MtG Kubbur</span>
      <span class="footer-tagline">Magic: The Gathering Cube Drafts á Íslandi</span>
    center: |
      <nav class="footer-nav">
        <a href="index.html">Stigatafla</a>
        <i class="ms ms-u footer-mana-sep" aria-hidden="true"></i>
        <a href="throun.html">Leikmaður</a>
        <i class="ms ms-r footer-mana-sep" aria-hidden="true"></i>
        <a href="einvigi.html">Einvígi</a>
        <i class="ms ms-b footer-mana-sep" aria-hidden="true"></i>
        <a href="kubbar.html">Kubbar</a>
        <i class="ms ms-g footer-mana-sep" aria-hidden="true"></i>
        <a href="dagatal.html">Dagatal</a>
      </nav>
    right: "© 2026 MtG Kubbur"

format:
  html:
    theme:
      light: [cosmo, theme.scss]
      dark: [cosmo, theme-dark.scss]
    css: styles.css
    toc: false
    include-after-body:
      text: |
        <script>
        (function() {
          var map = {
            'throun.html': 'en/player.html',
            'einvigi.html': 'en/head-to-head.html',
            'kubbar.html': 'en/cubes.html',
            'dagatal.html': 'en/calendar.html'
          };
          var page = location.pathname.split('/').pop() || 'index.html';
          var el = document.querySelector('a[aria-label="Switch to English"]');
          if (el && map[page]) el.href = map[page];
        })();
        </script>
    include-in-header:
      text: |
        <link href="https://cdn.jsdelivr.net/npm/mana-font@latest/css/mana.css" rel="stylesheet" type="text/css" />

engine: knitr
